<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kebutuhan dan Keinginan</title>
  <style>
    :root {
      --bg1: #F7FAFF;
      --bg2: #F3F6FF;
      --card: #FFFFFF;
      --ink: #0F172A;
      --muted: #475569;
      --line: rgba(226, 232, 240, .95);
      --brand: #4F46E5;
      --brand2: #06B6D4;
      --ok: #16A34A;
      --bad: #DC2626;
      --radius: 22px;
      --shadow: 0 18px 40px rgba(15, 23, 42, .08);
      --shadow2: 0 10px 22px rgba(15, 23, 42, .06);
      --focus: 0 0 0 4px rgba(79, 70, 229, .18);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(1200px 520px at 10% 0%, rgba(6, 182, 212, .18), transparent 60%),
        radial-gradient(1200px 520px at 90% 0%, rgba(79, 70, 229, .16), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2) 45%, var(--bg1));
      min-height: 100vh;
    }

    .app {
      width: min(1100px, 96vw);
      margin: 18px auto 26px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, .72);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow2);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(79, 70, 229, .18), rgba(6, 182, 212, .20));
      border: 1px solid rgba(226, 232, 240, .9);
      display: grid;
      place-items: center;
      font-weight: 1000;
      color: rgba(79, 70, 229, 1);
    }

    .brand h1 {
      margin: 0;
      font-size: 14px;
      line-height: 1.15;
      letter-spacing: .2px;
    }

    .brand .sub {
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      margin-top: 2px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid rgba(226, 232, 240, .95);
      background: rgba(255, 255, 255, .9);
      padding: 10px 12px;
      border-radius: 16px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(15, 23, 42, .06);
      transition: transform .06s ease, box-shadow .12s ease, background .12s ease;
      user-select: none;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0px);
    }

    .btn.primary {
      background: linear-gradient(135deg, rgba(79, 70, 229, .12), rgba(6, 182, 212, .14));
      border-color: rgba(79, 70, 229, .18);
    }

    .btn.ghost {
      background: transparent;
      box-shadow: none;
    }

    .btn:focus {
      outline: none;
      box-shadow: var(--focus);
    }

    .progressWrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 260px;
      justify-content: flex-end;
    }

    .progress {
      width: 180px;
      height: 10px;
      background: rgba(226, 232, 240, .9);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(226, 232, 240, .95);
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(79, 70, 229, .85), rgba(6, 182, 212, .85));
      border-radius: 999px;
      transition: width .25s ease;
    }

    .count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      font-weight: 900;
    }

    .stage {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .60);
      box-shadow: var(--shadow);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: calc(100vh - 145px);
    }

    .slide {
      flex: 1;
      background: rgba(255, 255, 255, .68);
      border: 1px solid rgba(229, 234, 245, .95);
      border-radius: var(--radius);
      box-shadow: var(--shadow2);
      padding: 20px;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .slideInner {
      max-width: 980px;
      margin: 0 auto;
      max-height: calc(100vh - 190px);
      overflow-y: auto;
      padding-right: 8px;
    }

    .slideInner::-webkit-scrollbar {
      width: 10px;
    }

    .slideInner::-webkit-scrollbar-thumb {
      background: rgba(96, 112, 153, .25);
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, .9);
    }

    .slideInner::-webkit-scrollbar-track {
      background: transparent;
    }

    h2 {
      margin: 6px 0 10px;
      font-size: 30px;
      letter-spacing: -.3px;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    p {
      margin: 0 0 10px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.55;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 1000;
      font-size: 12px;
      letter-spacing: .2px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(79, 70, 229, .16);
      background: rgba(79, 70, 229, .06);
      color: rgba(55, 65, 81, .95);
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .cols2 {
      grid-template-columns: 1fr 1fr;
    }

    .cols3 {
      grid-template-columns: repeat(3, 1fr);
    }

    @media (max-width: 860px) {

      .cols2,
      .cols3 {
        grid-template-columns: 1fr;
      }

      .progressWrap {
        min-width: unset;
      }

      .progress {
        width: 130px;
      }

      h2 {
        font-size: 26px;
      }
    }

    .card {
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(226, 232, 240, .95);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 10px 18px rgba(15, 23, 42, .06);
    }

    .hint {
      background: rgba(6, 182, 212, .10);
      border: 1px dashed rgba(6, 182, 212, .35);
      border-radius: 18px;
      padding: 12px 14px;
      color: rgba(30, 41, 59, .92);
      font-weight: 900;
      line-height: 1.5;
    }

    ul.list {
      margin: 8px 0 0 18px;
      color: var(--muted);
      font-weight: 850;
      line-height: 1.55;
    }

    .choices {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .choice {
      border: 1px solid rgba(226, 232, 240, .95);
      border-radius: 18px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, .96);
      font-weight: 950;
      color: rgba(30, 41, 59, .96);
      cursor: pointer;
      user-select: none;
      transition: transform .06s ease, border-color .12s ease, background .12s ease;
    }

    .choice:hover {
      transform: translateY(-1px);
    }

    .choice.active {
      border-color: rgba(79, 70, 229, .35);
      background: rgba(79, 70, 229, .06);
    }

    .choice.ok {
      border-color: rgba(22, 163, 74, .35);
      background: rgba(22, 163, 74, .08);
    }

    .choice.bad {
      border-color: rgba(220, 38, 38, .35);
      background: rgba(220, 38, 38, .08);
    }

    .feedback {
      display: none;
      margin-top: 10px;
      border-radius: 18px;
      padding: 12px 14px;
      border: 1px solid rgba(226, 232, 240, .95);
      background: rgba(255, 255, 255, .92);
      color: var(--muted);
      font-weight: 900;
      line-height: 1.5;
    }

    .feedback.show {
      display: block;
    }

    .fbOk {
      border-color: rgba(22, 163, 74, .35);
      background: rgba(22, 163, 74, .08);
      color: rgba(15, 23, 42, .92);
    }

    .fbBad {
      border-color: rgba(220, 38, 38, .35);
      background: rgba(220, 38, 38, .08);
      color: rgba(15, 23, 42, .92);
    }

    .input {
      width: 100%;
      border: 1px solid rgba(226, 232, 240, .95);
      background: rgba(255, 255, 255, .96);
      border-radius: 16px;
      padding: 12px 14px;
      font-weight: 950;
      color: rgba(30, 41, 59, .96);
    }

    .emojiBig {
      font-size: 58px;
      line-height: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 90px;
      padding: 8px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(79, 70, 229, .10), rgba(6, 182, 212, .10));
      border: 1px solid rgba(79, 70, 229, .16);
      font-weight: 1000;
      color: #3730a3;
    }

    .scenarioBox {
      border: 1px dashed rgba(79, 70, 229, .30);
      border-radius: 22px;
      padding: 16px;
      background: linear-gradient(180deg, rgba(79, 70, 229, .05), rgba(6, 182, 212, .05));
    }
  </style>
</head>

        html: `

          <div class="card" style="margin-top:12px">

              <li>Cara berpikir ini membantu kita memilih dengan lebih bijak.</li>
            </ul>
          </div>

          <div class="card" style="margin-top:12px;text-align:center">
            <button class="btn primary" data-goto="0">🏁 Balik ke awal</button>
          </div>

    ];

    let currentSlide = 0;
    const contentEl = document.getElementById("content");
    const barEl = document.getElementById("bar");
    const countEl = document.getElementById("count");
    const accessGate = document.getElementById("accessGate");
    const accessInput = document.getElementById("accessInput");

    function showSlide(index) {
      if (index < 0 || index >= slides.length) return;
      currentSlide = index;
      const slide = slides[index];
      contentEl.innerHTML = slide.html;
      barEl.style.width = `${((index + 1) / slides.length) * 100}%`;
      countEl.textContent = `${index + 1}/${slides.length}`;
    }
    document.getElementById("btnNext").addEventListener("click", () => showSlide(currentSlide + 1));
    document.getElementById("btnPrev").addEventListener("click", () => showSlide(currentSlide - 1));
    document.getElementById("btnHome").addEventListener("click", () => showSlide(0));
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") showSlide(currentSlide + 1);
      else if (e.key === "ArrowLeft") showSlide(currentSlide - 1);
    });
    document.addEventListener("click", (e) => {
      if (e.target.matches("[data-quiz] .choice")) {
        const choice = e.target;
        const quizWrap = choice.closest("[data-quiz]");
        const quizId = quizWrap.getAttribute("data-quiz");
        const feedbackEl = document.querySelector(`[data-quiz-feedback="${quizId}"]`);

        quizWrap.querySelectorAll(".choice").forEach(item => {
          item.classList.remove("active", "ok", "bad");
        });

        const answer = choice.getAttribute("data-answer");
        choice.classList.add("active");

        if (answer === "right") {
          choice.classList.add("ok");
          feedbackEl.textContent = "Benar!";
          feedbackEl.classList.remove("fbBad");
          feedbackEl.classList.add("fbOk", "show");
        } else {
          choice.classList.add("bad");
          feedbackEl.textContent = "Coba lagi ya!";
          feedbackEl.classList.remove("fbOk");
          feedbackEl.classList.add("fbBad", "show");
        }

      } else if (e.target.matches("[data-multi-check] .choice")) {
        e.target.classList.toggle("active");

      } else if (e.target.matches("[data-check-multi]")) {
        const btn = e.target;
        const multiId = btn.getAttribute("data-check-multi");
        const choices = document.querySelectorAll(`[data-multi-check="${multiId}"] .choice`);
        const feedbackEl = document.getElementById(`multiFb${multiId.slice(-1)}`);

        let allCorrect = true;
        let pickedAny = false;

        choices.forEach(choice => {
          const shouldBePicked = choice.getAttribute("data-answer") === "right";
          const isPicked = choice.classList.contains("active");

          choice.classList.remove("ok", "bad");

          if (isPicked) pickedAny = true;

          if (isPicked && shouldBePicked) {
            choice.classList.add("ok");
          } else if (isPicked && !shouldBePicked) {
            choice.classList.add("bad");
            allCorrect = false;
          } else if (!isPicked && shouldBePicked) {
            allCorrect = false;
          }
        });

        if (!pickedAny) {
          feedbackEl.textContent = "Pilih dulu jawabanmu ya!";
          feedbackEl.classList.remove("fbOk");
          feedbackEl.classList.add("fbBad", "show");
        } else if (allCorrect) {
          feedbackEl.textContent = "Hebat! Jawabanmu benar.";
          feedbackEl.classList.remove("fbBad");
          feedbackEl.classList.add("fbOk", "show");
        } else {
          feedbackEl.textContent = "Masih ada yang belum tepat. Coba lagi ya!";
          feedbackEl.classList.remove("fbOk");
          feedbackEl.classList.add("fbBad", "show");
        }

      } else if (e.target.matches("[data-goto]")) {
        const index = parseInt(e.target.getAttribute("data-goto"), 10);
        showSlide(index);
      }
    });

    document.getElementById("accessBtn").addEventListener("click", () => {
      const code = accessInput.value.trim().toUpperCase();
      const feedbackEl = document.getElementById("accessFb");
      if (code === ACCESS_CODE) {
        accessGate.style.display = "none";
        showSlide(0);
      } else {
        feedbackEl.textContent = "Kode salah, coba lagi!";
        feedbackEl.classList.add("fbBad", "show");
      }
    });

    accessInput.addEventListener("input", () => {
      accessInput.value = accessInput.value.toUpperCase();
    });
    accessInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        document.getElementById("accessBtn").click();
      }
    });

    showSlide(0);
  </script>
